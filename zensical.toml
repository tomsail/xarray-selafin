[project]
site_name = "xarray-selafin"
site_description = "Xarray backend for SELAFIN/SERAFIN file formats (TELEMAC)"
site_url = "https://tomsail.github.io/xarray-selafin/"
repo_url = "https://github.com/oceanmodeling/xarray-selafin"
repo_name = "oceanmodeling/xarray-selafin"
docs_dir = "docs"
site_dir = "site"
nav = [
  {"Home" = "index.md"},
  {"Getting Started" = "getting-started.md"},
  {"Examples" = "examples.md"},
  {"API Reference" = "api.md"},
]

[project.theme]
features = [
    "navigation.tabs",
    "navigation.path",
    "navigation.top",
    "toc.integrate",
    "content.code.copy",
    "content.code.annotate",
]

[project.theme.icon]
logo = "material/waves"

# Palette toggle for automatic mode
[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

# Palette toggle for light mode
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "blue"
accent = "cyan"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

# Palette toggle for dark mode
[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "blue"
accent = "cyan"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"

# admonitions
[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]

# lists
[project.markdown_extensions.def_list]
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

# emojis
[project.markdown_extensions.attr_list]
[project.markdown_extensions.pymdownx.emoji]

# code snippets
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.inlinehilite]

# tabbed content
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

# tables and HTML in markdown
[project.markdown_extensions.tables]
[project.markdown_extensions.md_in_html]

# table of contents
[project.markdown_extensions.toc]
permalink = true
